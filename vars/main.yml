---
nginx_key_url: https://nginx.org/keys/nginx_signing.key
nginx_key_name: nginx-archive-keyring.asc
nginx_key_path: /etc/apt/keyrings/

nginx_repositories:
  - "deb [signed-by={{ nginx_key_path }}{{ nginx_key_name }}] https://nginx.org/packages/ubuntu {{ ansible_facts['distribution_release'] }} main"
  - "deb-src [signed-by={{ nginx_key_path }}{{ nginx_key_name }}] https://nginx.org/packages/ubuntu {{ ansible_facts['distribution_release'] }} main"

nginx_path: /etc/nginx/
nginx_sites_available_path: "{{ nginx_path }}/sites-available/"
nginx_sites_enabled_path: "{{ nginx_path }}/sites-enabled/"
nginx_snippets_path: "{{ nginx_path }}/snippets/"
nginx_file_mode: 0644
